<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- bright base: warm violet on the left flowing to vivid blue on the right -->
    <linearGradient id="base" x1="0.05" y1="0.1" x2="0.95" y2="0.95">
      <stop offset="0" stop-color="#7a3ec2"/>
      <stop offset="0.4" stop-color="#5a45cf"/>
      <stop offset="0.75" stop-color="#2f6fe0"/>
      <stop offset="1" stop-color="#1e5fd6"/>
    </linearGradient>

    <radialGradient id="warm" cx="0.24" cy="0.7" r="0.9">
      <stop offset="0" stop-color="#ffb057"/>
      <stop offset="0.3" stop-color="#ff5d6c"/>
      <stop offset="0.65" stop-color="#ff3d8b" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ff3d8b" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow" cx="0.33" cy="0.58" r="0.42">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="0.55" stop-color="#ffab5e" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ffab5e" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="cool" cx="0.84" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#66e6ff"/>
      <stop offset="0.4" stop-color="#33b4ff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#33b4ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="teal" cx="0.95" cy="0.75" r="0.6">
      <stop offset="0" stop-color="#38e0c8" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#38e0c8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ribbonA" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0" stop-color="#ff6f91"/>
      <stop offset="0.5" stop-color="#b061ee"/>
      <stop offset="1" stop-color="#4fb4ff"/>
    </linearGradient>

    <linearGradient id="ribbonB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffc46b"/>
      <stop offset="0.55" stop-color="#ff6f9c"/>
      <stop offset="1" stop-color="#8f7bff"/>
    </linearGradient>

    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="softer" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="95"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#base)"/>

  <!-- large soft colour fields -->
  <g filter="url(#softer)">
    <ellipse cx="330" cy="740" rx="760" ry="560" fill="url(#warm)"/>
    <ellipse cx="1340" cy="280" rx="720" ry="600" fill="url(#cool)"/>
    <ellipse cx="1420" cy="800" rx="520" ry="420" fill="url(#teal)"/>
    <ellipse cx="430" cy="590" rx="400" ry="340" fill="url(#glow)"/>
  </g>

  <!-- flowing ribbons -->
  <g filter="url(#soft)" opacity="0.85">
    <path d="M-120 540 C 300 360, 720 700, 1120 440 S 1760 300, 1760 300 L 1760 700 C 1360 540, 900 880, 480 740 S -120 800, -120 800 Z"
          fill="url(#ribbonA)" opacity="0.5"/>
    <path d="M-120 720 C 360 620, 640 860, 1040 700 S 1760 560, 1760 560 L 1760 1040 L -120 1040 Z"
          fill="url(#ribbonB)" opacity="0.42"/>
  </g>

  <!-- faint vignette for depth, kept light so the picture stays vivid -->
  <radialGradient id="vig" cx="0.5" cy="0.5" r="0.75">
    <stop offset="0.7" stop-color="#000000" stop-opacity="0"/>
    <stop offset="1" stop-color="#0a1030" stop-opacity="0.16"/>
  </radialGradient>
  <rect width="1600" height="1000" fill="url(#vig)"/>
</svg>
